syntax = "proto3";

package order;

option go_package = "orderpb";

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc GetOrderStatus(GetOrderStatusRequest) returns (GetOrderStatusResponse);
  rpc StreamOrderUpdates(StreamOrderRequest) returns (stream GetOrderStatusResponse);

}

enum Roles {
  UNAUTHORISED_USER = 0;
  FREE_PLAN_USER = 1;
  PRO_PLAN_USER = 2;
  ADMIN = 3;
}

message CreateOrderRequest {
  string user_id = 1;
  string market_id = 2;
  string order_type = 3;
  double price = 4;
  double quantity = 5;
  Roles user_role = 6;
}

message CreateOrderResponse {
  string order_id = 1;
  string order_status = 2;
}

message GetOrderStatusRequest {
  string order_id = 1;
  Roles user_role = 2;
}

message GetOrderStatusResponse {
  string order_status = 1;
}

message StreamOrderRequest {
  string order_id = 1;
  Roles user_role = 2;
}

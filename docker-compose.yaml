
services:
# юзал просто depend_on без helthcheckов, хотя по идее должны быть именно они
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      #я знаю что так нельзя хранить имя и пароль, тем более передавать в виде файлов, но проект маленький
      # и переусложнять его такими штуками как правильное сохранение секретов и т.д - мне показалось излишним
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gRPCbigApp
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  jaeger:
    image: jaegertracing/all-in-one:1.54
    ports:
      - "16686:16686"
      - "14268:14268"

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - order-service
      - market-service

  order-service:
    build:
      context: .
      dockerfile: ./dockerfiles/dockerOrderFile/Dockerfile
    ports:
      - "50051:50051"
      - "2112:2112"
    depends_on:
      - redis
      - postgres
    environment:
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/gRPCbigApp"
      REDIS_ADDR: "redis:6379"

  market-service:
    build:
      context: .
      dockerfile: ./dockerfiles/dockerServiceFile/Dockerfile
    ports:
      - "50052:50052"
      - "2113:2113"
    depends_on:
      - redis
    environment:
      REDIS_ADDR: "redis:6379"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: gRPCbigApp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      order-service:
        condition: service_started

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    environment:
      #old versions capability (tbh - not sure how it will works in normal prod version, but bcs its all-in-one, just on case)
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" #Jaeger UI, just default
      - "4317:4317" #OTLP grpc, we send our trce here
      - "4318:4318" #OTLP HTTP, we dont have http, so just in case i guess?

  order-service:
    build:
      context: .
      dockerfile: App/OrderService/OrderServiceCMD/Dockerfile
    ports:
      - "50051:50051"
      - "2112:2112"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVICE_NAME: "order-service"
      SERVICE_VERSION: "0.0.1" #i remember that stuff about versions, but im not sure its matter there
      ENVIRONMENT: "dev" #dev forever
      OPEN_TELEMETRY_ENDPOINT: "jaeger:4317"
      TRACING_ENABLED: "true"
      TRACING_SAMPLE_RATION: "0.2"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/gRPCbigApp"
      REDIS_ADDR: "redis:6379"
      GRPC_PORT: "50051"
      METRICS_PORT: "2112"
      JWT_SECRET: "change-me-in-production"
      OUTBOX_POLL_INTERVAL: "5"
      OUTBOX_BUTCH_SIZE: "100"
      RATE_LIMIT_PER_MIN: "100"

  market-service:
    build:
      context: .
      dockerfile: App/SpotInstrumentService/MarketServiceCMD/Dockerfile
    ports:
      - "50052:50052"
      - "2113:2113"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    environment:
      SERVICE_NAME: "market-service"
      SERVICE_VERSION: "0.0.1" #i remember that stuff about versions, but im not sure its matter there
      ENVIRONMENT: "dev" #dev forever
      OPEN_TELEMETRY_ENDPOINT: "jaeger:4317"
      TRACING_ENABLED: "true"
      TRACING_SAMPLE_RATION: "0.2"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/gRPCbigApp"
      REDIS_ADDR: "redis:6379"
      GRPC_PORT: "50052"
      METRICS_PORT: "2113"
      JWT_SECRET: "change-me-in-production"


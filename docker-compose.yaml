services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gRPCbigApp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres -d gRPCbigApp"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

      #пока поставил полу заглушенный вариант, позже переделаю
  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10


  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      order-service:
        condition: service_started
      market-service:
        condition: service_started

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  order-service:
    build:
      context: .
      dockerfile: OrderService/CMD/OrderService.dockerfile
    ports:
      - "50051:50051"
      - "2112:2112"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      SERVICE_NAME: "order-service"
      SERVICE_VERSION: "0.0.1"
      ENVIRONMENT: "dev"
      OPEN_TELEMETRY_ENDPOINT: "jaeger:4317"
      TRACING_ENABLED: "true"
      TRACING_SAMPLE_RATIO: "0.2"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/gRPCbigApp"
      REDIS_ADDR: "redis:6379"
      GRPC_PORT: "50051"
      METRICS_PORT: "2112"
      JWT_SECRET: "change-me-in-production"
      RATE_LIMIT_PER_MIN: "5000"

  market-service:
    build:
      context: .
      dockerfile: SpotInstrumentService/CMD/MarketService.dockerfile
    ports:
      - "50052:50052"
      - "2113:2113"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      SERVICE_NAME: "market-service"
      SERVICE_VERSION: "0.0.1"
      ENVIRONMENT: "dev"
      OPEN_TELEMETRY_ENDPOINT: "jaeger:4317"
      TRACING_ENABLED: "true"
      TRACING_SAMPLE_RATIO: "0.2"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/gRPCbigApp"
      REDIS_ADDR: "redis:6379"
      GRPC_PORT: "50052"
      METRICS_PORT: "2113"
      JWT_SECRET: "change-me-in-production"
      RATE_LIMIT_PER_MIN: "5000"


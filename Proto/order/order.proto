syntax = "proto3";

package order;

option go_package = "/order";

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc GetOrderStatusByID(OrderStatusByIDRequest) returns (OrderStatusByIDResponse);
  rpc StreamOrderUpdates(StreamOrderRequest) returns (stream OrderStatusByIDResponse);
  rpc GetOrderStatusAll(OrderStatusAllRequest) returns (OrderStatusAllResponse);
}

message OrderStatusStruct {
  string order_id = 1;
  string status = 2;
}


message CreateOrderRequest {
  string market_id = 1;
  string order_type = 2;
  string price = 3;
  string quantity = 4;
}

message CreateOrderResponse {
  string order_id = 1;
  string order_status = 2;
}

message OrderStatusByIDRequest {
  string order_id = 1;
}

message OrderStatusByIDResponse {
  string order_id = 1;
  string order_status = 2;
}

message OrderStatusAllRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message OrderStatusAllResponse {
  repeated OrderStatusStruct orders = 1;
  string next_page_token = 2;
}

message StreamOrderRequest {
  string order_id = 1;
}

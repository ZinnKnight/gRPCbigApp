syntax = "proto3";

package auth;

import "validate.proto";

enum Roles {
  UNAUTHORISED_USER = 0;
  FREE_PLAN_USER = 1;
  PRO_PLAN_USER = 2;
  ADMIN = 3;
}

message User {
  string UserID = 1 [(validate.rules).string.uuid = true];
  string UserName = 2 [(validate.rules).bytes = {
    pattern:   "^[A-Za-z]+( [A-Za-z]+)*$",
    min_len: 4,
    max_len: 16,
  }];
  string UserPassword = 3 [(validate.rules).string = {}];
  Roles UserRole = 4;
}


service AuthService {
  rpc UserRegistration(RegisterRequest) returns (AuthResponse);
  rpc UserLogin(LoginRequest) returns (AuthResponse);
  rpc PlanChange(PlanChangeRequest) returns (PlanChangeResponse);
  rpc AdminCheck(IsAdminRequest) returns (IsAdminResponse);
}

// посмотреть саму логику валидации и ссылки на структуру, тип как мы вообще это обрабатываем

message RegisterRequest {
  string user_name = 1;
  string user_password = 2;
  Roles user_role = 3;
}

message LoginRequest {
  string user_id = 1;
}

message AuthResponse {
  string token = 1;
}


message PlanChangeRequest {
  // unspecified под user_role
  string user_name = 1;
  Roles user_role = 2;
}

message PlanChangeResponse {
  string token = 1;
  string message = 2;
}

message IsAdminRequest {
  string user_id = 1;
}

message IsAdminResponse {
  bool user_is_admin = 1;
}
version: v2
clean: true
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: #?
  disable:
    - file_option: go_package
      module: #?
plugins:
  - remote: buf.build/protocolbuffers/go
    out: #?
    opt: #?
    include_imports: true
inputs:
  - #? Если правильно понял, то можно сюда закинуть модуль для валидации протошников, что бы не копировать его в репу
  - tarball: #?
    subdir: proto
  - zip_archive: #?
  - proto_file: #?
